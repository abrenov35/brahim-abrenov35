<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AB RENOV — Suivi Chantiers</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0f1e30;--navy2:#1c3248;--navy3:#213b55;
  --beige:#F3EAE2;--beige2:#e8ddd4;
  --violet:#A4A0C3;--violet2:rgba(164,160,195,0.14);
  --green:#5bb891;--green2:rgba(91,184,145,0.13);
  --red:#d9615f;
  --text:#ffffff;--muted:rgba(255,255,255,0.6);--dim:rgba(255,255,255,0.35);
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  --radius:10px;--radius-lg:18px;
  --font:'Raleway',sans-serif;--mono:'DM Mono',monospace;
  --hh:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--navy);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}

/* HEADER */
.header{position:sticky;top:0;z-index:100;height:var(--hh);background:#0d1b2a;border-bottom:1px solid rgba(255,255,255,0.15);box-shadow:0 2px 20px rgba(0,0,0,0.5)}
.header-inner{max-width:860px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 18px}
.header-brand{display:flex;align-items:center;gap:13px}
.brand-logo{width:44px;height:44px;background:var(--beige);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(0,0,0,0.25)}
.brand-logo span{font-size:18px;font-weight:900;color:var(--navy);letter-spacing:-1px;line-height:1}
.brand-name{font-size:17px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--beige)}
.brand-sub{font-size:10px;color:var(--violet);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:1px}
.btn-refresh{width:38px;height:38px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-refresh:hover{color:var(--beige);border-color:var(--violet)}

/* STATS BAND */
.stats-band{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border2)}
.stat-card{background:rgba(255,255,255,0.05);padding:14px 10px;text-align:center}
.stat-card.hl{background:rgba(164,160,195,0.18)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:4px}
.stat-value{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--beige)}
.stat-card.hl .stat-value{color:var(--violet)}

/* TABS */
.tabs{display:flex;background:rgba(255,255,255,0.04);border-bottom:1px solid var(--border2);position:sticky;top:var(--hh);z-index:90}
.tab{flex:1;padding:13px 6px;background:transparent;border:none;color:var(--muted);font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab.active{color:var(--beige);border-bottom-color:var(--violet)}
.tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-v{background:var(--violet)}.dot-g{background:var(--green)}
.tab-count{background:rgba(243,234,226,0.07);color:var(--muted);font-size:10px;padding:1px 6px;border-radius:99px;min-width:20px;text-align:center}
.tab.active .tab-count{background:var(--violet);color:#fff}

/* MAIN */
.main-content{max-width:860px;margin:0 auto;padding:0 0 80px}
.tab-content{display:none}.tab-content.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 14px;gap:12px;flex-wrap:wrap}
.section-header h2{font-size:14px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--beige)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-row select,#stats-annee{padding:7px 12px;background:var(--navy2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;cursor:pointer;outline:none}
.info-banner{margin:0 16px 16px;padding:11px 16px;background:var(--violet2);border-radius:var(--radius);font-size:12px;color:var(--violet);border-left:3px solid var(--violet);font-weight:600}
.btn-add{padding:9px 18px;background:var(--violet);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.btn-add:active{opacity:.8}

/* CARDS */
.chantier-list{padding:0 16px}
.chantier-card{background:rgba(243,234,226,0.07);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px 10px 18px;margin-bottom:8px;position:relative;animation:fadeUp .22s ease;transition:border-color .2s,transform .15s}
.chantier-card:hover{border-color:var(--violet);transform:translateY(-1px)}
.chantier-card::before{content:'';position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 2px 2px 0}
.chantier-card.previsionnel::before{background:var(--violet)}
.chantier-card.facture::before{background:var(--green)}
.chantier-card.zero{opacity:.72}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-left{flex:1;min-width:0}
.card-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.card-client{font-size:14px;font-weight:800;letter-spacing:.5px;flex:1;color:#ffffff;text-transform:uppercase}
.card-montant{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--violet);white-space:nowrap}
.card-montant.gris{font-size:13px;color:var(--muted);font-style:italic;font-weight:500}
.chantier-card.facture .card-montant{color:var(--green)}

.card-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);border:1px solid var(--border)}
.card-tag.ftag{background:var(--green2);color:var(--green);border-color:rgba(91,184,145,.3);font-family:var(--mono);font-size:10px}
.card-tag.dtag{background:var(--violet2);color:var(--violet);border-color:rgba(164,160,195,.3)}
.card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn-edit,.btn-del{width:30px;height:30px;border-radius:6px;cursor:pointer;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;padding:0}
.btn-edit{background:transparent;color:var(--muted)}.btn-edit:hover{background:rgba(243,234,226,.08);color:var(--beige)}
.btn-del{background:transparent;color:var(--dim)}.btn-del:hover{background:rgba(217,97,95,.12);color:var(--red);border-color:rgba(217,97,95,.3)}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;font-weight:600}

/* STATS */
#stats-content{padding:0 16px 16px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.stat-big{background:var(--navy2);border:1px solid var(--border2);border-radius:var(--radius);padding:18px}
.stat-big-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:var(--muted);margin-bottom:6px}
.stat-big-value{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--beige)}
.stat-big-value.v{color:var(--violet)}.stat-big-value.g{color:var(--green)}
.stitle{font-size:11px;font-weight:800;color:var(--violet);text-transform:uppercase;letter-spacing:2px;margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border2)}
.month-row{display:flex;align-items:center;padding:10px 14px;background:var(--navy2);border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:6px;gap:12px}
.month-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;min-width:80px;color:var(--beige)}
.month-bar-wrap{flex:1;height:5px;background:rgba(243,234,226,.07);border-radius:99px;overflow:hidden}
.month-bar{height:100%;background:var(--green);border-radius:99px;transition:width .5s ease}
.month-amount{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--green);min-width:90px;text-align:right}
.month-count{font-size:10px;color:var(--muted);min-width:60px;text-align:right;font-weight:600}
.year-row{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--navy2);border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:8px}
.year-label{font-size:20px;font-weight:900;color:var(--beige)}
.year-amount{font-size:18px;font-weight:800;color:var(--violet)}
.year-count{font-size:11px;color:var(--muted);font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,18,35,.83);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;backdrop-filter:blur(6px)}
@media(min-width:600px){.modal-overlay{align-items:center;padding:24px}}
.modal-box{width:100%;max-width:500px;background:var(--navy2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;border:1px solid var(--border2);border-bottom:none;animation:slideUp .25s ease;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal-box{border-radius:var(--radius-lg);border:1px solid var(--border2);max-height:85vh}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 0;margin-bottom:20px}
.modal-header h3{font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:var(--beige)}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:0 20px 24px}
.field-group{margin-bottom:16px}
.field-group label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--violet);margin-bottom:7px}
.field-hint{font-size:10px;font-weight:400;color:var(--dim);text-transform:none;letter-spacing:0}
.field-group input{width:100%;padding:12px 14px;background:var(--navy3);border:1.5px solid var(--border2);border-radius:var(--radius);color:var(--beige);font-family:var(--font);font-size:15px;outline:none;transition:border-color .2s}
.field-group input:focus{border-color:var(--violet)}
.field-group input::placeholder{color:var(--dim)}
input[type="date"]{color-scheme:dark}
.modal-actions{display:flex;gap:10px;margin-top:24px}
.btn-cancel,.btn-save{flex:1;padding:14px;border-radius:var(--radius);font-family:var(--font);font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;border:none}
.btn-cancel{background:rgba(243,234,226,.06);color:var(--muted);border:1px solid var(--border2)}
.btn-save{background:var(--violet);color:#fff}
.btn-save:active,.btn-cancel:active{opacity:.8}

/* STATUS */
.status-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:99px;font-size:13px;font-weight:700;z-index:300;animation:fadeUp .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.status-bar.success{background:var(--green);color:#fff}
.status-bar.error{background:var(--red);color:#fff}
.status-bar.info{background:var(--navy2);color:var(--text);border:1px solid var(--border2)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(min-width:600px){
  .stat-value{font-size:17px}.tab{font-size:12px;padding:15px 12px}
  .card-client{font-size:15px}.card-montant{font-size:18px}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:860px){
  .header-inner,.stats-band,.tabs,.main-content{max-width:860px;margin-left:auto;margin-right:auto}
}
</style>
</head>
<body>

<div id="app">
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-logo"><span>AB</span></div>
        <div>
          <div class="brand-name">AB RENOV</div>
          <div class="brand-sub">Aménagement &amp; Rénovation</div>
        </div>
      </div>
      <button class="btn-refresh" onclick="loadData()" title="Actualiser">↻</button>
    </div>
  </header>

  <section class="stats-band">
    <div class="stat-card"><div class="stat-label">Prévisionnel</div><div class="stat-value" id="stat-prev">—</div></div>
    <div class="stat-card hl"><div class="stat-label">Facturé <span id="stat-annee-label">2026</span></div><div class="stat-value" id="stat-annee">—</div></div>
    <div class="stat-card"><div class="stat-label">Ce mois</div><div class="stat-value" id="stat-mois">—</div></div>
  </section>

  <nav class="tabs">
    <button class="tab active" data-tab="previsionnel" onclick="switchTab('previsionnel')">
      <span class="tab-dot dot-v"></span>Prévisionnels<span class="tab-count" id="count-prev">0</span>
    </button>
    <button class="tab" data-tab="facture" onclick="switchTab('facture')">
      <span class="tab-dot dot-g"></span>Facturés<span class="tab-count" id="count-fact">0</span>
    </button>
    <button class="tab" data-tab="stats" onclick="switchTab('stats')">▦ Stats</button>
  </nav>

  <main class="main-content">

    <div id="tab-previsionnel" class="tab-content active">
      <div class="section-header">
        <h2>Chantiers prévisionnels</h2>
        <button class="btn-add" onclick="openModal('add')">+ Ajouter</button>
      </div>
      <div class="info-banner">Saisir un numéro de facture fait basculer le chantier en Facturés automatiquement.</div>
      <div id="list-previsionnel" class="chantier-list"><div class="loading">Chargement…</div></div>
    </div>

    <div id="tab-facture" class="tab-content">
      <div class="section-header">
        <h2>Chantiers facturés</h2>
        <div class="filter-row">
          <select id="filter-annee" onchange="renderFactures()"><option value="">Toutes années</option></select>
          <select id="filter-mois" onchange="renderFactures()">
            <option value="">Tous mois</option>
            <option value="1">Janvier</option><option value="2">Février</option><option value="3">Mars</option>
            <option value="4">Avril</option><option value="5">Mai</option><option value="6">Juin</option>
            <option value="7">Juillet</option><option value="8">Août</option><option value="9">Septembre</option>
            <option value="10">Octobre</option><option value="11">Novembre</option><option value="12">Décembre</option>
          </select>
        </div>
      </div>
      <div id="list-facture" class="chantier-list"><div class="loading">Chargement…</div></div>
    </div>

    <div id="tab-stats" class="tab-content">
      <div class="section-header">
        <h2>Statistiques</h2>
        <select id="stats-annee" onchange="renderStats()"><option value="">Toutes années</option></select>
      </div>
      <div id="stats-content"><div class="loading">Chargement…</div></div>
    </div>

  </main>
  <div id="status-bar" class="status-bar hidden"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Nouveau chantier</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="field-id"/>
      <div class="field-group"><label>Client / Référence *</label><input type="text" id="field-client" placeholder="Ex : M. Dupont — Cuisine"/></div>
      <div class="field-group"><label>Montant (€)</label><input type="number" id="field-montant" placeholder="Ex : 2450" min="0" step="0.01"/></div>
      <div class="field-group"><label>Information libre</label><input type="text" id="field-info" placeholder="Ex : Semaine 42"/></div>
      <div class="field-group"><label>Numéro de facture <span class="field-hint">(vide = prévisionnel)</span></label><input type="text" id="field-facture" placeholder="Ex : FAC-2026-018"/></div>
      <div class="field-group"><label>Date</label><input type="date" id="field-date"/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveChantier()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyuFLgzcyv8Hj7eWJN5RJc90KsothvsN9Mo8rX5Pt74n8l0br4aO_9R6EUyDq5pH6eYZg/exec';
let allData = [];

window.addEventListener('DOMContentLoaded', () => loadData());

async function loadData() {
  showStatus('Chargement…','info');
  try {
    const res  = await fetch(API_URL + '?action=getAll', { redirect:'follow' });
    const text = await res.text();
    const json = JSON.parse(text);
    if (json.status !== 'ok') throw new Error(json.message);
    allData = json.data || [];
    renderAll();
    hideStatus();
  } catch(err) {
    console.error(err);
    showStatus('❌ Erreur de chargement','error',5000);
    allData = [];
    renderAll();
  }
}

function renderAll() {
  renderPrevisionnels();
  renderFactures();
  renderStats();
  renderBand();
  updateFilters();
}

function renderPrevisionnels() {
  let list = allData.filter(c => c.statut === 'previsionnel');
  list.sort((a,b) => {
    const ma = Number(a.montant||0), mb = Number(b.montant||0);
    if(ma===0 && mb>0) return 1;
    if(mb===0 && ma>0) return -1;
    return mb - ma;
  });
  document.getElementById('count-prev').textContent = list.length;
  const el = document.getElementById('list-previsionnel');
  if(!list.length){ el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p>Aucun chantier prévisionnel</p></div>'; return; }
  el.innerHTML = list.map(c => {
    const z = Number(c.montant||0)===0;
    return `<div class="chantier-card previsionnel${z?' zero':''}">
      <div class="card-row">
        <div class="card-left">
          <div class="card-client">${esc(c.client)}</div>
          <div class="card-meta">
            ${c.information?`<span class="card-tag">${esc(c.information)}</span>`:''}
            <span class="card-tag dtag">${fmtDate(c.date_creation)}</span>
          </div>
        </div>
        <div class="card-right">
          <div class="card-montant${z?' gris':''}">${z?'À définir':fmt(c.montant)}</div>
          <div class="card-actions">
            <button class="btn-edit" onclick="openModal('edit','${c.id}')" title="Modifier">✏️</button>
            <button class="btn-del" onclick="del('${c.id}')" title="Supprimer">✕</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderFactures() {
  let list = allData.filter(c => c.statut === 'facture');
  const a = document.getElementById('filter-annee').value;
  const m = document.getElementById('filter-mois').value;
  if(a) list = list.filter(c => String(c.annee)===a);
  if(m) list = list.filter(c => String(c.mois)===m);
  list.sort((a,b) => new Date(b.date_creation) - new Date(a.date_creation));
  document.getElementById('count-fact').textContent = allData.filter(c=>c.statut==='facture').length;
  const el = document.getElementById('list-facture');
  if(!list.length){ el.innerHTML='<div class="empty-state"><div class="empty-icon">🧾</div><p>Aucun chantier facturé</p></div>'; return; }
  el.innerHTML = list.map(c => `<div class="chantier-card facture">
    <div class="card-row">
      <div class="card-left">
        <div class="card-client">${esc(c.client)}</div>
        <div class="card-meta">
          <span class="card-tag ftag">${esc(c.facture)}</span>
          <span class="card-tag dtag">${fmtDate(c.date_creation)}</span>
          ${c.information?`<span class="card-tag">${esc(c.information)}</span>`:''}
          <span class="card-tag">${nomMois(c.mois)} ${c.annee}</span>
        </div>
      </div>
      <div class="card-right">
        <div class="card-montant">${fmt(c.montant)}</div>
        <div class="card-actions">
          <button class="btn-edit" onclick="openModal('edit','${c.id}')" title="Modifier">✏️</button>
          <button class="btn-del" onclick="del('${c.id}')" title="Supprimer">✕</button>
        </div>
      </div>
    </div>
  </div>`).join('');
}

function renderStats() {
  const annee = document.getElementById('stats-annee').value ? Number(document.getElementById('stats-annee').value) : null;
  let fac = allData.filter(c=>c.statut==='facture');
  if(annee) fac = fac.filter(c=>Number(c.annee)===annee);
  const totFac  = fac.reduce((s,c)=>s+Number(c.montant||0),0);
  const totPrev = allData.filter(c=>c.statut==='previsionnel').reduce((s,c)=>s+Number(c.montant||0),0);
  const parMois = {};
  for(let m=1;m<=12;m++) parMois[m]={total:0,count:0};
  fac.forEach(c=>{const m=Number(c.mois);if(m>=1&&m<=12){parMois[m].total+=Number(c.montant||0);parMois[m].count++;}});
  const maxM = Math.max(...Object.values(parMois).map(v=>v.total),1);
  const annees = {};
  allData.filter(c=>c.statut==='facture').forEach(c=>{const a=c.annee||'—';if(!annees[a])annees[a]={total:0,count:0};annees[a].total+=Number(c.montant||0);annees[a].count++;});
  document.getElementById('stats-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-big"><div class="stat-big-label">Prévisionnel en cours</div><div class="stat-big-value v">${fmt(totPrev)}</div></div>
      <div class="stat-big"><div class="stat-big-label">Facturé ${annee||'global'}</div><div class="stat-big-value g">${fmt(totFac)}</div></div>
      <div class="stat-big"><div class="stat-big-label">Chantiers facturés</div><div class="stat-big-value">${fac.length}</div></div>
    </div>
    <div class="stitle">Par mois ${annee||''}</div>
    ${Object.entries(parMois).map(([m,d])=>{
      const pct=Math.round((d.total/maxM)*100);
      return `<div class="month-row"><div class="month-name">${nomMois(m)}</div><div class="month-bar-wrap"><div class="month-bar" style="width:${pct}%"></div></div><div class="month-count">${d.count} chantier${d.count>1?'s':''}</div><div class="month-amount">${d.total>0?fmt(d.total):'—'}</div></div>`;
    }).join('')}
    <div class="stitle" style="margin-top:32px">Par année</div>
    ${Object.entries(annees).sort((a,b)=>b[0]-a[0]).map(([a,d])=>`<div class="year-row"><div class="year-label">${a}</div><div class="year-count">${d.count} chantier${d.count>1?'s':''}</div><div class="year-amount">${fmt(d.total)}</div></div>`).join('')||'<div class="empty-state"><p>Aucune donnée</p></div>'}`;
}

function renderBand() {
  const now=new Date(), a=now.getFullYear(), m=now.getMonth()+1;
  const totPrev  = allData.filter(c=>c.statut==='previsionnel').reduce((s,c)=>s+Number(c.montant||0),0);
  const totAnnee = allData.filter(c=>c.statut==='facture'&&Number(c.annee)===a).reduce((s,c)=>s+Number(c.montant||0),0);
  const totMois  = allData.filter(c=>c.statut==='facture'&&Number(c.annee)===a&&Number(c.mois)===m).reduce((s,c)=>s+Number(c.montant||0),0);
  document.getElementById('stat-prev').textContent        = fmt(totPrev);
  document.getElementById('stat-annee').textContent       = fmt(totAnnee);
  document.getElementById('stat-annee-label').textContent = a;
  document.getElementById('stat-mois').textContent        = fmt(totMois);
}

function updateFilters() {
  const annees = [...new Set(allData.filter(c=>c.annee).map(c=>String(c.annee)))].sort((a,b)=>b-a);
  ['filter-annee','stats-annee'].forEach(id=>{
    const sel=document.getElementById(id), val=sel.value;
    sel.innerHTML='<option value="">Toutes années</option>'+annees.map(a=>`<option value="${a}">${a}</option>`).join('');
    sel.value=val;
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.toggle('active',e.id===`tab-${tab}`));
}

function openModal(mode, id) {
  document.getElementById('modal-overlay').classList.remove('hidden');
  if(mode==='add'){
    document.getElementById('modal-title').textContent='Nouveau chantier';
    ['field-id','field-client','field-montant','field-info','field-facture','field-date'].forEach(f=>document.getElementById(f).value='');
  } else {
    const c=allData.find(x=>x.id===id); if(!c) return;
    document.getElementById('modal-title').textContent='Modifier le chantier';
    document.getElementById('field-id').value      = c.id;
    document.getElementById('field-client').value  = c.client||'';
    document.getElementById('field-montant').value = c.montant||'';
    document.getElementById('field-info').value    = c.information||'';
    document.getElementById('field-facture').value = c.facture||'';
    document.getElementById('field-date').value    = c.date_creation ? String(c.date_creation).split('T')[0] : '';
  }
}

function closeModal(evt) {
  if(evt&&evt.target!==document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.add('hidden');
}

async function saveChantier() {
  const id      = document.getElementById('field-id').value.trim();
  const client  = document.getElementById('field-client').value.trim();
  const montant = document.getElementById('field-montant').value.trim();
  if(!client){ alert('Le nom du client est obligatoire.'); return; }
  const payload = {
    action: id?'update':'add', client,
    montant: montant?Number(montant):0,
    information: document.getElementById('field-info').value.trim(),
    facture:     document.getElementById('field-facture').value.trim(),
    date_creation: document.getElementById('field-date').value || new Date().toISOString().split('T')[0]
  };
  if(id) payload.id=id;
  try {
    const res  = await fetch(API_URL,{method:'POST',body:JSON.stringify(payload),redirect:'follow'});
    const json = JSON.parse(await res.text());
    if(json.status!=='ok') throw new Error(json.message);
    closeModal();
    showStatus('✅ Chantier enregistré !','success',3000);
    await loadData();
  } catch(err){ console.error(err); showStatus('❌ Erreur enregistrement','error',4000); }
}

async function del(id) {
  const c=allData.find(x=>x.id===id);
  if(!c||!confirm(`Supprimer "${c.client}" ?`)) return;
  try {
    const res  = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'delete',id}),redirect:'follow'});
    const json = JSON.parse(await res.text());
    if(json.status!=='ok') throw new Error(json.message);
    showStatus('Chantier supprimé.','success',3000);
    await loadData();
  } catch(err){ showStatus('❌ Erreur suppression','error',4000); }
}

function fmt(val) {
  const n=Number(val);
  if(isNaN(n)||val===''||val===null||val===undefined) return '—';
  return n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
}
function fmtDate(val) {
  if(!val) return '—';
  const d=new Date(val); if(isNaN(d)) return val;
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function nomMois(n) {
  return ['','Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][Number(n)]||'—';
}
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let stTimer=null;
function showStatus(msg,type='info',duration=0){
  const bar=document.getElementById('status-bar');
  bar.textContent=msg; bar.className=`status-bar ${type}`; bar.classList.remove('hidden');
  if(stTimer) clearTimeout(stTimer);
  if(duration>0) stTimer=setTimeout(hideStatus,duration);
}
function hideStatus(){ document.getElementById('status-bar').classList.add('hidden'); }
</script>
</body>
