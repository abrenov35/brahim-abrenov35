<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AB RENOV — Suivi Chantiers</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#162D49;--beige:#F3EAE2;--beige2:#ede4db;--violet:#A4A0C3;--green:#3d9e70;--red:#b84a47;--muted:rgba(22,45,73,0.5);--dim:rgba(22,45,73,0.28);--border:rgba(22,45,73,0.12);--font:'Raleway',sans-serif;--mono:'DM Mono',monospace;--r:10px;--hh:64px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{width:100%;}
body{width:100%;font-family:var(--font);background:var(--beige);color:var(--navy);min-height:100vh;-webkit-font-smoothing:antialiased;}
.hidden{display:none!important;}
.header{width:100%;background:var(--navy);height:var(--hh);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.08);}
.header-inner{width:100%;max-width:900px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{width:40px;height:40px;background:var(--beige);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--navy);letter-spacing:-1px;flex-shrink:0;}
.brand-name{font-size:15px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;color:#fff;}
.brand-sub{font-size:9px;color:rgba(255,255,255,0.45);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:1px;}
.btn-refresh{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.btn-refresh:hover{color:#fff;border-color:rgba(255,255,255,0.4);}
.stats-band{width:100%;background:var(--navy);padding:10px 16px 12px;display:flex;align-items:center;justify-content:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.07);flex-wrap:wrap;}
.stat-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:99px;}
.stat-pill-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.5);white-space:nowrap;}
.stat-pill-sep{color:rgba(255,255,255,0.2);}
.stat-pill-value{font-size:14px;font-weight:800;color:#fff;white-space:nowrap;}
.tabs{width:100%;background:var(--beige2);border-bottom:1px solid var(--border);display:flex;position:sticky;top:var(--hh);z-index:90;}
.tab{flex:1;padding:13px 6px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);}
.tab-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dot-v{background:var(--violet);}.dot-g{background:var(--green);}
.tab-count{background:rgba(22,45,73,0.08);color:var(--muted);font-size:9px;padding:1px 6px;border-radius:99px;font-family:var(--mono);}
.tab.active .tab-count{background:var(--navy);color:#fff;}
.main-wrap{width:100%;}
.tab-pane{display:none;width:100%;}.tab-pane.active{display:block;width:100%;}
.section-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:18px 16px 14px;gap:12px;flex-wrap:wrap;}
.section-title{font-size:13px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--navy);}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;}
.filter-row select,#stats-annee{padding:7px 10px;background:#fff;border:1px solid var(--border);border-radius:8px;color:var(--navy);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;outline:none;}
.info-msg{margin:0 16px 14px;padding:10px 14px;background:rgba(164,160,195,0.1);border-left:3px solid var(--violet);border-radius:0 8px 8px 0;font-size:11.5px;color:#6b6891;font-weight:600;line-height:1.5;}
.btn-add{padding:9px 18px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;box-shadow:0 3px 10px rgba(22,45,73,0.2);}
.btn-add:active{opacity:.8;}
.card-list{width:100%;padding:0 16px 16px;}
.card{width:100%;display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:11px 12px 11px 16px;margin-bottom:8px;position:relative;box-shadow:0 1px 4px rgba(22,45,73,0.06);animation:fadeUp .2s ease both;transition:box-shadow .15s,transform .15s;}
.card:hover{box-shadow:0 3px 12px rgba(22,45,73,0.1);transform:translateY(-1px);}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:10px 0 0 10px;}
.card.prev::before{background:var(--violet);}.card.fact::before{background:var(--green);}
.card.zero{opacity:.65;}
.card-left{flex:1;min-width:0;overflow:hidden;}
.card-client{font-size:13px;font-weight:800;letter-spacing:.5px;color:var(--navy);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.tag{display:inline-flex;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(22,45,73,0.06);color:var(--muted);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px;}
.tag.t-fact{background:rgba(61,158,112,0.1);color:var(--green);border-color:rgba(61,158,112,0.2);font-family:var(--mono);text-transform:none;letter-spacing:0;}
.tag.t-date{background:rgba(164,160,195,0.1);color:#6b6891;border-color:rgba(164,160,195,0.25);}
.card-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.card-amount{font-size:16px;font-weight:800;color:var(--navy);white-space:nowrap;font-variant-numeric:tabular-nums;}
.card-amount.green{color:var(--green);}.card-amount.grey{font-size:12px;color:var(--dim);font-weight:500;font-style:italic;}
.card-actions{display:flex;gap:5px;}
.btn-edit,.btn-del{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;padding:0;}
.btn-edit:hover{background:rgba(22,45,73,.06);color:var(--navy);}
.btn-del:hover{background:rgba(184,74,71,.08);color:var(--red);border-color:rgba(184,74,71,.25);}
.empty{text-align:center;padding:52px 24px;color:var(--muted);}
.empty-icon{font-size:30px;opacity:.3;margin-bottom:12px;}
.empty p{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
#stats-content{padding:0 16px 16px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(3,1fr);}}
.stat-big{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:0 1px 4px rgba(22,45,73,0.06);}
.stat-big-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.stat-big-value{font-size:20px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;}
.stat-big-value.v{color:var(--violet);}.stat-big-value.g{color:var(--green);}
.stitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin:24px 0 12px;display:flex;align-items:center;gap:10px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--border);}
.month-row{display:flex;align-items:center;padding:10px 14px;background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;gap:12px;box-shadow:0 1px 3px rgba(22,45,73,0.05);}
.month-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;min-width:80px;color:var(--navy);}
.month-bar-wrap{flex:1;height:4px;background:rgba(22,45,73,.06);border-radius:99px;overflow:hidden;}
.month-bar{height:100%;background:var(--green);border-radius:99px;transition:width .5s ease;}
.month-amount{font-size:13px;font-weight:800;color:var(--green);min-width:90px;text-align:right;font-variant-numeric:tabular-nums;}
.month-count{font-size:10px;color:var(--muted);min-width:60px;text-align:right;font-weight:600;}
.year-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:0 1px 3px rgba(22,45,73,0.05);}
.year-label{font-size:18px;font-weight:900;color:var(--navy);}
.year-amount{font-size:16px;font-weight:800;color:var(--violet);}
.year-count{font-size:10px;color:var(--muted);font-weight:600;}
.modal-overlay{position:fixed;inset:0;background:rgba(22,45,73,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;backdrop-filter:blur(6px);}
@media(min-width:600px){.modal-overlay{align-items:center;padding:24px;}}
.modal-box{width:100%;max-width:500px;background:var(--beige);border-radius:18px 18px 0 0;border:1px solid var(--border);border-bottom:none;animation:slideUp .25s ease;max-height:92vh;overflow-y:auto;}
@media(min-width:600px){.modal-box{border-radius:18px;border:1px solid var(--border);}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 18px 0;margin-bottom:18px;}
.modal-header h3{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:var(--navy);}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:0 18px 22px;}
.field-group{margin-bottom:14px;}
.field-group label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:6px;}
.field-hint{font-size:10px;font-weight:400;color:var(--dim);text-transform:none;letter-spacing:0;}
.field-group input{width:100%;padding:11px 13px;background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--navy);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;}
.field-group input:focus{border-color:var(--navy);}
.field-group input::placeholder{color:var(--dim);}
input[type="date"]{color-scheme:light;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-cancel,.btn-save{flex:1;padding:13px;border-radius:8px;font-family:var(--font);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;transition:opacity .2s;}
.btn-cancel{background:rgba(22,45,73,.08);color:var(--muted);border:1px solid var(--border);}
.btn-save{background:var(--navy);color:#fff;}
.btn-save:active,.btn-cancel:active{opacity:.8;}
.status-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:99px;font-size:12px;font-weight:700;z-index:300;animation:fadeUp .3s ease;white-space:nowrap;box-shadow:0 8px 24px rgba(22,45,73,.2);}
.status-bar.success{background:var(--green);color:#fff;}
.status-bar.error{background:var(--red);color:#fff;}
.status-bar.info{background:var(--navy);color:var(--beige);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">AB</div>
      <div>
        <div class="brand-name">AB RENOV</div>
        <div class="brand-sub">Aménagement &amp; Rénovation</div>
      </div>
    </div>
    <button class="btn-refresh" onclick="loadData()">↻</button>
  </div>
</header>
<div class="stats-band">
  <div class="stat-pill"><span class="stat-pill-label">Prévisionnel</span><span class="stat-pill-sep">·</span><span class="stat-pill-value" id="stat-prev">—</span></div>
  <div class="stat-pill"><span class="stat-pill-label">Facturé <span id="stat-annee-label">2026</span></span><span class="stat-pill-sep">·</span><span class="stat-pill-value" id="stat-annee">—</span></div>
  <div class="stat-pill"><span class="stat-pill-label">Ce mois</span><span class="stat-pill-sep">·</span><span class="stat-pill-value" id="stat-mois">—</span></div>
</div>
<nav class="tabs">
  <button class="tab active" data-tab="previsionnel" onclick="switchTab('previsionnel')"><span class="tab-dot dot-v"></span>Prévisionnels<span class="tab-count" id="count-prev">0</span></button>
  <button class="tab" data-tab="facture" onclick="switchTab('facture')"><span class="tab-dot dot-g"></span>Facturés<span class="tab-count" id="count-fact">0</span></button>
  <button class="tab" data-tab="stats" onclick="switchTab('stats')">▦ Stats</button>
</nav>
<div class="main-wrap">
  <div id="tab-previsionnel" class="tab-pane active">
    <div class="section-header">
      <div class="section-title">Chantiers prévisionnels</div>
      <button class="btn-add" onclick="openModal('add')">+ Ajouter</button>
    </div>
    <div class="info-msg">Saisir un numéro de facture fait basculer le chantier en Facturés automatiquement.</div>
    <div id="list-previsionnel" class="card-list"><div class="loading">Chargement…</div></div>
  </div>
  <div id="tab-facture" class="tab-pane">
    <div class="section-header">
      <div class="section-title">Chantiers facturés</div>
      <div class="filter-row">
        <select id="filter-annee" onchange="renderFactures()"><option value="">Toutes années</option></select>
        <select id="filter-mois" onchange="renderFactures()"><option value="">Tous mois</option><option value="1">Janvier</option><option value="2">Février</option><option value="3">Mars</option><option value="4">Avril</option><option value="5">Mai</option><option value="6">Juin</option><option value="7">Juillet</option><option value="8">Août</option><option value="9">Septembre</option><option value="10">Octobre</option><option value="11">Novembre</option><option value="12">Décembre</option></select>
      </div>
    </div>
    <div id="list-facture" class="card-list"><div class="loading">Chargement…</div></div>
  </div>
  <div id="tab-stats" class="tab-pane">
    <div class="section-header">
      <div class="section-title">Statistiques</div>
      <select id="stats-annee" onchange="renderStats()"><option value="">Toutes années</option></select>
    </div>
    <div id="stats-content"><div class="loading">Chargement…</div></div>
  </div>
</div>
<div id="status-bar" class="status-bar hidden"></div>
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Nouveau chantier</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="field-id"/>
      <div class="field-group"><label>Client / Référence *</label><input type="text" id="field-client" placeholder="Ex : M. Dupont — Cuisine"/></div>
      <div class="field-group"><label>Montant (€)</label><input type="number" id="field-montant" placeholder="Ex : 2450" min="0" step="0.01"/></div>
      <div class="field-group"><label>Information libre</label><input type="text" id="field-info" placeholder="Ex : Semaine 42"/></div>
      <div class="field-group"><label>Numéro de facture <span class="field-hint">(vide = prévisionnel)</span></label><input type="text" id="field-facture" placeholder="Ex : FAC-2026-018"/></div>
      <div class="field-group"><label>Date</label><input type="date" id="field-date"/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveChantier()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbyuFLgzcyv8Hj7eWJN5RJc90KsothvsN9Mo8rX5Pt74n8l0br4aO_9R6EUyDq5pH6eYZg/exec';
let allData=[];
window.addEventListener('DOMContentLoaded',()=>loadData());
async function loadData(){showStatus('Chargement…','info');try{const res=await fetch(API_URL+'?action=getAll',{redirect:'follow'});const json=JSON.parse(await res.text());if(json.status!=='ok')throw new Error(json.message);allData=json.data||[];renderAll();hideStatus();}catch(err){console.error(err);showStatus('❌ Erreur de chargement','error',5000);allData=[];renderAll();}}
function renderAll(){renderPrevisionnels();renderFactures();renderStats();renderBand();updateFilters();}
function renderPrevisionnels(){let list=allData.filter(c=>c.statut==='previsionnel');list.sort((a,b)=>{const ma=Number(a.montant||0),mb=Number(b.montant||0);if(ma===0&&mb>0)return 1;if(mb===0&&ma>0)return -1;return mb-ma;});document.getElementById('count-prev').textContent=list.length;const el=document.getElementById('list-previsionnel');if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>Aucun chantier prévisionnel</p></div>';return;}el.innerHTML=list.map(c=>{const z=Number(c.montant||0)===0;return`<div class="card prev${z?' zero':''}"><div class="card-left"><div class="card-client">${esc(c.client)}</div><div class="card-meta">${c.information?`<span class="tag">${esc(c.information)}</span>`:''}<span class="tag t-date">${fmtDate(c.date_creation)}</span></div></div><div class="card-right"><div class="card-amount${z?' grey':''}">${z?'À définir':fmt(c.montant)}</div><div class="card-actions"><button class="btn-edit" onclick="openModal('edit','${c.id}')">✏️</button><button class="btn-del" onclick="del('${c.id}')">✕</button></div></div></div>`;}).join('');}
function renderFactures(){let list=allData.filter(c=>c.statut==='facture');const a=document.getElementById('filter-annee').value,m=document.getElementById('filter-mois').value;if(a)list=list.filter(c=>String(c.annee)===a);if(m)list=list.filter(c=>String(c.mois)===m);list.sort((a,b)=>new Date(b.date_creation)-new Date(a.date_creation));document.getElementById('count-fact').textContent=allData.filter(c=>c.statut==='facture').length;const el=document.getElementById('list-facture');if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">🧾</div><p>Aucun chantier facturé</p></div>';return;}el.innerHTML=list.map(c=>`<div class="card fact"><div class="card-left"><div class="card-client">${esc(c.client)}</div><div class="card-meta"><span class="tag t-fact">${esc(c.facture)}</span><span class="tag t-date">${fmtDate(c.date_creation)}</span>${c.information?`<span class="tag">${esc(c.information)}</span>`:''}<span class="tag">${nomMois(c.mois)} ${c.annee}</span></div></div><div class="card-right"><div class="card-amount green">${fmt(c.montant)}</div><div class="card-actions"><button class="btn-edit" onclick="openModal('edit','${c.id}')">✏️</button><button class="btn-del" onclick="del('${c.id}')">✕</button></div></div></div>`).join('');}
function renderStats(){const annee=document.getElementById('stats-annee').value?Number(document.getElementById('stats-annee').value):null;let fac=allData.filter(c=>c.statut==='facture');if(annee)fac=fac.filter(c=>Number(c.annee)===annee);const totFac=fac.reduce((s,c)=>s+Number(c.montant||0),0);const totPrev=allData.filter(c=>c.statut==='previsionnel').reduce((s,c)=>s+Number(c.montant||0),0);const parMois={};for(let m=1;m<=12;m++)parMois[m]={total:0,count:0};fac.forEach(c=>{const m=Number(c.mois);if(m>=1&&m<=12){parMois[m].total+=Number(c.montant||0);parMois[m].count++;}});const maxM=Math.max(...Object.values(parMois).map(v=>v.total),1);const annees={};allData.filter(c=>c.statut==='facture').forEach(c=>{const a=c.annee||'—';if(!annees[a])annees[a]={total:0,count:0};annees[a].total+=Number(c.montant||0);annees[a].count++;});document.getElementById('stats-content').innerHTML=`<div class="stats-grid"><div class="stat-big"><div class="stat-big-label">Prévisionnel en cours</div><div class="stat-big-value v">${fmt(totPrev)}</div></div><div class="stat-big"><div class="stat-big-label">Facturé ${annee||'global'}</div><div class="stat-big-value g">${fmt(totFac)}</div></div><div class="stat-big"><div class="stat-big-label">Chantiers facturés</div><div class="stat-big-value">${fac.length}</div></div></div><div class="stitle">Par mois ${annee||''}</div>${Object.entries(parMois).map(([m,d])=>{const pct=Math.round((d.total/maxM)*100);return`<div class="month-row"><div class="month-name">${nomMois(m)}</div><div class="month-bar-wrap"><div class="month-bar" style="width:${pct}%"></div></div><div class="month-count">${d.count} chantier${d.count>1?'s':''}</div><div class="month-amount">${d.total>0?fmt(d.total):'—'}</div></div>`;}).join('')}<div class="stitle" style="margin-top:32px">Par année</div>${Object.entries(annees).sort((a,b)=>b[0]-a[0]).map(([a,d])=>`<div class="year-row"><div class="year-label">${a}</div><div class="year-count">${d.count} chantier${d.count>1?'s':''}</div><div class="year-amount">${fmt(d.total)}</div></div>`).join('')||'<div class="empty"><p>Aucune donnée</p></div>'}`;}
function renderBand(){const now=new Date(),a=now.getFullYear(),m=now.getMonth()+1;const totPrev=allData.filter(c=>c.statut==='previsionnel').reduce((s,c)=>s+Number(c.montant||0),0);const totAnnee=allData.filter(c=>c.statut==='facture'&&Number(c.annee)===a).reduce((s,c)=>s+Number(c.montant||0),0);const totMois=allData.filter(c=>c.statut==='facture'&&Number(c.annee)===a&&Number(c.mois)===m).reduce((s,c)=>s+Number(c.montant||0),0);document.getElementById('stat-prev').textContent=fmt(totPrev);document.getElementById('stat-annee').textContent=fmt(totAnnee);document.getElementById('stat-annee-label').textContent=a;document.getElementById('stat-mois').textContent=fmt(totMois);}
function updateFilters(){const annees=[...new Set(allData.filter(c=>c.annee).map(c=>String(c.annee)))].sort((a,b)=>b-a);['filter-annee','stats-annee'].forEach(id=>{const sel=document.getElementById(id),val=sel.value;sel.innerHTML='<option value="">Toutes années</option>'+annees.map(a=>`<option value="${a}">${a}</option>`).join('');sel.value=val;});}
function switchTab(tab){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.tab-pane').forEach(e=>e.classList.toggle('active',e.id===`tab-${tab}`));}
function openModal(mode,id){document.getElementById('modal-overlay').classList.remove('hidden');if(mode==='add'){document.getElementById('modal-title').textContent='Nouveau chantier';['field-id','field-client','field-montant','field-info','field-facture','field-date'].forEach(f=>document.getElementById(f).value='');}else{const c=allData.find(x=>x.id===id);if(!c)return;document.getElementById('modal-title').textContent='Modifier le chantier';document.getElementById('field-id').value=c.id;document.getElementById('field-client').value=c.client||'';document.getElementById('field-montant').value=c.montant||'';document.getElementById('field-info').value=c.information||'';document.getElementById('field-facture').value=c.facture||'';document.getElementById('field-date').value=c.date_creation?String(c.date_creation).split('T')[0]:'';}}
function closeModal(evt){if(evt&&evt.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').classList.add('hidden');}
async function saveChantier(){const id=document.getElementById('field-id').value.trim();const client=document.getElementById('field-client').value.trim();const montant=document.getElementById('field-montant').value.trim();if(!client){alert('Le nom du client est obligatoire.');return;}const payload={action:id?'update':'add',client,montant:montant?Number(montant):0,information:document.getElementById('field-info').value.trim(),facture:document.getElementById('field-facture').value.trim(),date_creation:document.getElementById('field-date').value||new Date().toISOString().split('T')[0]};if(id)payload.id=id;try{const res=await fetch(API_URL,{method:'POST',body:JSON.stringify(payload),redirect:'follow'});const json=JSON.parse(await res.text());if(json.status!=='ok')throw new Error(json.message);closeModal();showStatus('✅ Chantier enregistré !','success',3000);await loadData();}catch(err){console.error(err);showStatus('❌ Erreur enregistrement','error',4000);}}
async function del(id){const c=allData.find(x=>x.id===id);if(!c||!confirm(`Supprimer "${c.client}" ?`))return;try{const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'delete',id}),redirect:'follow'});const json=JSON.parse(await res.text());if(json.status!=='ok')throw new Error(json.message);showStatus('Chantier supprimé.','success',3000);await loadData();}catch(err){showStatus('❌ Erreur suppression','error',4000);}}
function fmt(val){const n=Number(val);if(isNaN(n)||val===''||val===null||val===undefined)return'—';return n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});}
function fmtDate(val){if(!val)return'—';const d=new Date(val);if(isNaN(d))return val;return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function nomMois(n){return['','Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][Number(n)]||'—';}
function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let stTimer=null;
function showStatus(msg,type='info',duration=0){const bar=document.getElementById('status-bar');bar.textContent=msg;bar.className=`status-bar ${type}`;bar.classList.remove('hidden');if(stTimer)clearTimeout(stTimer);if(duration>0)stTimer=setTimeout(hideStatus,duration);}
function hideStatus(){document.getElementById('status-bar').classList.add('hidden');}
</script>
